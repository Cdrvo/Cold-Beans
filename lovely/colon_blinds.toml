[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''G.blind_select = UIBox{'''
position = "before"
payload = '''
local colonparen_blindselect_offset;
if G.GAME.round_resets.blind_states['Forced'] == "Select" then
    colonparen_blindselect_offset = 0
elseif G.GAME.round_resets.blind_states['Teeny'] == "Select" then
    colonparen_blindselect_offset = 5
elseif G.GAME.round_resets.blind_states['Small'] == "Select" then
    colonparen_blindselect_offset = 1
else
    colonparen_blindselect_offset = -4
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''config = {align="bmi", offset = {x=0,y=G.ROOM.T.y + 29},major = G.hand, bond = 'Weak'}'''
position = "at"
payload = '''config = {align="bmi", offset = {x=colonparen_blindselect_offset,y=G.ROOM.T.y + 29},major = G.hand, bond = 'Weak'}'''
match_indent = true



[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''G.blind_select.alignment.offset.x = 0'''
position = "at"
payload = '''
if G.GAME.round_resets.blind_states['Forced'] == "Select" then
    G.blind_select.alignment.offset.x = 0
elseif G.GAME.round_resets.blind_states['Teeny'] == "Select" then
    G.blind_select.alignment.offset.x = 5
elseif G.GAME.round_resets.blind_states['Small'] == "Select" then
    G.blind_select.alignment.offset.x = 1
else
    G.blind_select.alignment.offset.x = -4
end'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''G.blind_select.alignment.offset.x = 0'''
position = "at"
payload = '''
if G.GAME.round_resets.blind_states['Forced'] == "Select" then
    G.blind_select.alignment.offset.x = 0
elseif G.GAME.round_resets.blind_states['Teeny'] == "Select" then

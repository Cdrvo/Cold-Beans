pattern = '''G.GAME.round_resets.blind_states[skip_to] = 'Select''''
position = "after"
payload = '''
if (G.GAME.round_resets.blind_states['Forced'] == "Select") or (G.GAME.round_resets.blind_choices.CEO == "bl_cbean_colon_magnetar") then
    G.blind_select.alignment.offset.x = 0
elseif G.GAME.round_resets.blind_states['Teeny'] == "Select" then

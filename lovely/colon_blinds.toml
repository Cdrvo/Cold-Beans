match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "add_round_eval_row({name = 'bottom', dollars = dollars})"
position = "before"
payload = '''
if G.GAME.ForcedBlindStates then
    for i, v in pairs(G.GAME.ForcedBlindStates) do G.GAME.round_resets.blind_states[i] = v end
    G.GAME.ForcedBlindStates = nil
    G.GAME.round_resets.blind_states['Forced'] = nil
    G.GAME.round_resets.blind_choices["Forced"] = nil
end
if G.GAME.round_resets.blind_choices.CEO == 'Defeated' then
    reset_blinds()
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
if G.GAME.round_resets.ante == G.GAME.win_ante and G.GAME.blind:get_type() == 'Boss' then
    game_won = true
    G.GAME.won = true
end
'''
position = "after"
payload = '''
if G.GAME.round_resets.ante == G.GAME.win_ante then --Minty: This stomps the normal check ☹️ but not anything patched into it 🙂
    local _,final = G.GAME.blind:get_type()
    game_won = final
    G.GAME.won = final
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''G.blind_select_opts.small = G.GAME.round_resets.blind_states['Small'] ~= 'Hide' and UIBox{definition = {n=G.UIT.ROOT, config={align = "cm", colour = G.C.CLEAR}, nodes={UIBox_dyn_container({create_UIBox_blind_choice('Small')},false,get_blind_main_colour('Small'))}}, config = {align="bmi", offset = {x=0,y=0}}} or nil'''
position = "before"
payload = '''
if (G.GAME.round_resets.force_blind) or (G.GAME.round_resets.blind_choices["Forced"]) then
    G.GAME.blind_on_deck = "Forced"
    if not G.GAME.round_resets.blind_choices["Forced"] then
        G.GAME.round_resets.blind_choices["Forced"] = G.GAME.round_resets.force_blind
    end
    G.GAME.round_resets.blind_states['Forced'] = "Select"
    G.GAME.ForcedBlindStates = {}
    for i, v in pairs(G.GAME.round_resets.blind_states) do G.GAME.ForcedBlindStates[i] = v end
    G.GAME.round_resets.loc_blind_states.Forced = "Select"
    G.blind_select_opts.forced = G.GAME.round_resets.blind_states['Forced'] ~= 'Hide' and UIBox{definition = {n=G.UIT.ROOT, config={align = "cm", colour = G.C.CLEAR}, nodes={UIBox_dyn_container({create_UIBox_blind_choice('Forced')},false,get_blind_main_colour('Forced'))}}, config = {align="bmi", offset = {x=0,y=0}}} or nil
    local t = {n=G.UIT.ROOT, config = {align = 'tm',minw = width, r = 0.15, colour = G.C.CLEAR}, nodes={
        {n=G.UIT.R, config={align = "cm", padding = 0.5}, nodes={
            G.GAME.round_resets.blind_states['Forced'] ~= 'Hide' and {n=G.UIT.O, config={align = "cm", object = G.blind_select_opts.forced}} or nil,
        }}
    }}
    G.GAME.round_resets.force_blind = nil
    return t 
end
if G.GAME.round_resets.blind_choices.CEO == "bl_cbean_colon_magnetar" then
    -- devious shit incoming
    G.GAME.round_resets.blind_states['CEO'] = "Select"
    G.GAME.round_resets.loc_blind_states.CEO = "Select"
    G.GAME.blind_on_deck = "CEO"
    G.blind_select_opts.ceo = G.GAME.round_resets.blind_states['CEO'] ~= 'Hide' and UIBox{definition = {n=G.UIT.ROOT, config={align = "cm", colour = G.C.CLEAR}, nodes={UIBox_dyn_container({create_UIBox_blind_choice('CEO')},false,get_blind_main_colour('CEO'), mix_colours(G.C.BLACK, get_blind_main_colour('CEO'), 0.8))}}, config = {align="bmi", offset = {x=0,y=0}}} or nil
    return {n=G.UIT.ROOT, config = {align = 'tm',minw = width, r = 0.15, colour = G.C.CLEAR}, nodes={
        {n=G.UIT.R, config={align = "cm", padding = 0.5}, nodes={
            G.GAME.round_resets.blind_states['CEO'] ~= 'Hide' and {n=G.UIT.O, config={align = "cm", object = G.blind_select_opts.ceo}} or nil,
        }}
    }}
end
G.blind_select_opts.teeny = G.GAME.round_resets.blind_states['Teeny'] ~= 'Hide' and UIBox{definition = {n=G.UIT.ROOT, config={align = "cm", colour = G.C.CLEAR}, nodes={UIBox_dyn_container({create_UIBox_blind_choice('Teeny')},false,get_blind_main_colour('Teeny'))}}, config = {align="bmi", offset = {x=0,y=0}}} or nil
G.blind_select_opts.ceo = G.GAME.round_resets.blind_states['CEO'] ~= 'Hide' and UIBox{definition = {n=G.UIT.ROOT, config={align = "cm", colour = G.C.CLEAR}, nodes={UIBox_dyn_container({create_UIBox_blind_choice('CEO')},false,get_blind_main_colour('CEO'), mix_colours(G.C.BLACK, get_blind_main_colour('CEO'), 0.8))}}, config = {align="bmi", offset = {x=0,y=0}}} or nil

'''
match_indent = true


[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Yeah Mostly Artists

# Random pool
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''local _pool, _starting_pool, _pool_key, _pool_size = G.ARGS.TEMP_POOL, nil, '', 0'''
position = "after"
match_indent = true
payload = '''
if next(SMODS.find_card("c_cbean_yma_enigma")) then
    for k, v in pairs(SMODS.ConsumableTypes) do
        if _type == k then
            local _pool, discard_key2 = get_current_pool('Consumeables')
        end
    end
end
'''

# Resets temporary consumeable cards
[[patches]] 
[patches.pattern]
target = "functions/common_events.lua"
pattern = "-- TARGET: evaluate your own general effects"
position = "before"
match_indent = true
payload = '''
if context.end_of_round and context.cardarea == G.consumeables then
    for k, v in pairs(G.consumeables.cards) do
        if v.ability and v.ability.yma_temp_key then
            local key = v.ability.yma_temp_key
            v.ability.yma_temp_key = nil
            G.E_MANAGER:add_event(Event({
                trigger = 'before',
                delay = 0.0,
                func = (function()
                    card_eval_status_text(card, "extra", nil, nil, nil, {message = localize("k_reset"), colour = G.C.FILTER})
                    YMA_reroll_card(v, key, v.ability.yma_temp_set, nil, nil, v.ability.yma_temp_ability_table, true)
                    return true
                end)
            }))
        end
    end
end
'''

# Before After context
[[patches]] 
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
G.E_MANAGER:add_event(Event({
    trigger = 'after',delay = 0.4,
    func = (function()  update_hand_text({delay = 0, immediate = true}, {mult = 0, chips = 0, chip_total = math.floor( SMODS.calculate_round_score() ), level = '', handname = ''});play_sound('button', 0.9, 0.6);return true end)
}))
'''
position = "before"
payload = '''
SMODS.calculate_context({full_hand = G.play.cards, scoring_hand = scoring_hand, scoring_name = text, poker_hands = poker_hands, yma = {before_after = true}, total_chips = math.floor(SMODS.calculate_round_score())})
'''
match_indent = true

# Game:update
[[patches]]
[patches.pattern]
target = 'game.lua'
position = 'before'
pattern = '''if self.STATE == self.STATES.PLAY_TAROT then'''
payload = '''
if self.STATE == self.STATES.GRAVEYARD then
  update_graveyard()
end
if self.STATE == self.STATES.MAIN_STREET then
  update_main_street()
end
'''
match_indent = true

# ease_background_colour_blind
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
position = 'before'
pattern = '''elseif state == G.STATES.TAROT_PACK then'''
payload = '''
elseif state == G.STATES.GRAVEYARD then
    ease_colour(G.C.DYN_UI.MAIN, mix_colours(G.C.GREY, G.C.BLACK, 0.9))
'''
match_indent = true

# TEMPORARY PATCH (probably not temporary)
# save_run
[[patches]]
[patches.pattern]
target = 'functions/misc_functions.lua'
position = 'at'
pattern = '''STATE = G.STATE,'''
payload = '''
STATE = G.STATE == G.STATES.GRAVEYARD and G.STATES.SHOP or G.STATE,
'''
match_indent = true

# Remove graveyard when closing the run and what not
[[patches]]
[patches.pattern]
target = 'game.lua'
position = 'after'
pattern = '''if self.shop then self.shop:remove(); self.shop = nil end'''
payload = '''
if self.graveyard then self.graveyard:remove(); self.graveyard = nil end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
position = 'after'
pattern = '''G.shop = nil'''
payload = '''
if G.graveyard then
  G.graveyard:remove()
  G.graveyard = nil
end
'''
match_indent = true

# Game Variables
[[patches]] #G.GAME 
[patches.pattern]
target = 'game.lua'
pattern = '''
unused_discards = 0,'''
position = 'after'
payload = '''
cbean = {
    quest_complete = false,
    completed_quests = {},
    destroyed_jokers = {},
},
'''
match_indent = true 

# [Side Quests] Makes cardarea work with calculate function
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''-- TARGET: add your own CardAreas for joker evaluation'''
position = "before"
payload = '''
    if G.side_quests then
        table.insert(t, G.side_quests)
    end
'''
match_indent = true

# [Side Quests] - Create a new quest upon completion
[[patches]] #G.GAME 
[patches.pattern]
target = 'game.lua'
pattern = '''function Game:update(dt)'''
position = 'after'
payload = '''
    if G.GAME.cbean_quest_complete then
        SMODS.add_card { set = "yma_quest", area = G.side_quests }
        G.GAME.cbean_quest_complete = false
    end
'''
match_indent = true 

# [Side Quests] - Pool
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''--cull the pool'''
position = 'before'
payload = '''
if _type == 'yma_quest' then
    _starting_pool, _pool_key = G.P_CENTER_POOLS["yma_quest"], 'yma_quest'..(_append or '')
end
'''
match_indent = true

# [Side Quests] - Default Pool
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''elseif _type == 'Joker' then _pool[#_pool + 1] = "j_joker"'''
position = 'before'
payload = '''
elseif _type == 'yma_quest' then _pool[#_pool + 1] = "q_cbean_yma_credit_card"
'''
match_indent = true

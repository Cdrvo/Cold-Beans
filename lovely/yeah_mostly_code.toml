[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Yeah Mostly Artists

# Random pool
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''local _pool, _starting_pool, _pool_key, _pool_size = G.ARGS.TEMP_POOL, nil, '', 0'''
position = "after"
match_indent = true
payload = '''
if next(SMODS.find_card("c_cbean_yma_enigma")) then
    for k, v in pairs(SMODS.ConsumableTypes) do
        if _type == k then
            local _pool, discard_key2 = get_current_pool('Consumeables')
        end
    end
end
'''

# Pool fix for Seeing Stars
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''elseif _type == 'Joker' then _pool[#_pool + 1] = "j_joker"'''
position = "before"
match_indent = true
payload = '''
elseif _type == 'Joker' and next(SMODS.find_card("j_cbean_yma_seeing_stars")) then _pool[#_pool + 1] = "j_astronomer"
'''

# Before before context
[[patches]] 
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
local text,disp_text,poker_hands,scoring_hand,non_loc_disp_text = G.FUNCS.get_poker_hand_info(G.play.cards)
'''
position = "before"
payload = '''
local fake_text,fake_disp_text,fake_poker_hands,fake_scoring_hand,fake_non_loc_disp_text = G.FUNCS.get_poker_hand_info(G.play.cards)
SMODS.calculate_context({full_hand = G.play.cards, scoring_hand = fake_scoring_hand, scoring_name = fake_text, poker_hands = fake_poker_hands, yma_before_before = true})
'''
match_indent = true


# Yeah Mostly Artists

# Random pool
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''local _pool, _starting_pool, _pool_key, _pool_size = G.ARGS.TEMP_POOL, nil, '', 0'''
position = "after"
match_indent = true
payload = '''
if next(SMODS.find_card("c_cbean_yma_enigma")) then
    for k, v in pairs(SMODS.ConsumableTypes) do
        if _type == k then
            local _pool, discard_key2 = get_current_pool('Consumeables')
        end
    end
end
'''

# Stop drawing
[[patches]]
[patches.pattern]
target = 'cardarea.lua'
match_indent = true
position = 'after'
pattern = '''
(self.config.type == 'deck' and self ~= G.deck) or
'''
payload = '''
(self.config.type == 'tboi_items_hide') or
'''


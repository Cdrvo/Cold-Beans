# Resets temporary consumeable cards
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "-- TARGET: evaluate your own general effects"
position = "before"
match_indent = true
payload = '''
if context.cardarea == G.consumeables then
    for k, v in pairs(G.consumeables.cards) do
        if v.ability and v.ability.yma_temp_key and context[v.ability.yma_context] then
            local key = v.ability.yma_temp_key
            v.ability.yma_temp_key = nil
            G.E_MANAGER:add_event(Event({
                trigger = 'before',
                delay = 0.0,
                func = (function()
                    card_eval_status_text(card, "extra", nil, nil, nil, {message = localize("k_reset"), colour = G.C.FILTER})
                    YMA_reroll_card(v, key, v.ability.yma_temp_set, nil, nil, v.ability.yma_temp_ability_table, true)
                    return true
                end)
            }))
        end
        if v.ability and v.ability.yma_failed_pray then
            v.ability.yma_failed_pray = nil
        end
    end
end
if context.cardarea == G.jokers then
    for k, v in pairs(G.jokers.cards) do
        if v.ability and v.ability.yma_quest_temporary and context[v.ability.yma_context] then
            v.ability.yma_quest_temporary = nil
            SMODS.destroy_cards(v, nil, nil, true)
            SMODS.calculate_effect({message = localize('k_yma_key_faded') }, v)
        end
    end
    for k, v in pairs(G.jokers.cards) do
        if v.ability and v.ability.yma_temp_key and context[v.ability.yma_context] then
            local key = v.ability.yma_temp_key
            v.ability.yma_temp_key = nil
            G.E_MANAGER:add_event(Event({
                trigger = 'before',
                delay = 0.0,
                func = (function()
                    card_eval_status_text(card, "extra", nil, nil, nil, {message = localize("k_reset"), colour = G.C.FILTER})
                    YMA_reroll_card(v, key, v.ability.yma_temp_set, nil, nil, v.ability.yma_temp_ability_table, true)
                    return true
                end)
            }))
        end
    end
end
if context.ending_shop and G.GAME.cbean.patience_quest then
    G.GAME.cbean.patience_quest = false
    SMODS.change_free_rerolls(-5)
end
'''

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''
-- TARGET: add your own individual scoring targets
'''
position = "after"
payload = '''
if G.GAME.selected_back.ability then
    for k, v in pairs(G.GAME.selected_back.ability) do
        if v and SMODS.Stickers[k] then
            t[#t + 1] = { object = SMODS.Stickers[k], scored_card = G.deck.cards[1] or G.deck, tname_deck_sticker_calc = true }
        end
    end
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''
local eff, triggered = individual.object:calculate(context)
'''
position = "at"
payload = '''
local eff, triggered
if individual.tname_deck_sticker_calc then
    if individual.object.calculate then
        eff, triggered = individual.object:calculate(G.deck.cards[1] or G.deck, context)
    end
else
    eff, triggered = individual.object:calculate(context)
end
'''
match_indent = true

# Deck Stickers 

[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
    G.CONTROLLER.locks.toggle_shop = true
    if G.shop then 
'''
position = "after"
payload = '''
if G.GAME.selected_back then
	if (pseudorandom("deck_sticker") < 1 / 4) and G.GAME.modifiers.deck_stickers then
		local ae = NAMETEAM.poll_sticker(true, G.GAME.selected_back, true, "Deck")
		if ae then
			G.GAME.selected_back:nteam_apply_sticker(ae)
            if G.deck.cards[1] then
                SMODS.calculate_effect { card = G.deck.cards[1] or G.deck, message = localize(ae, "labels") .. "!" }
            end
		end
	end
end
'''
match_indent = true


# Deck Blind Sticker apply function

[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
SMODS.calculate_context({end_of_round = true, game_over = game_over, beat_boss = G.GAME.blind.boss, scoring_hand = SMODS.last_hand.scoring_hand, scoring_name = SMODS.last_hand.scoring_name, full_hand = SMODS.last_hand.full_hand })
'''
position = "at"
payload = '''
SMODS.calculate_context({end_of_round = true, game_over = game_over, beat_boss = G.GAME.blind.boss, beat_ceo = (Colonparen.get_blind_type(G.GAME.blind)=="CEO"), beat_teeny = (Colonparen.get_blind_type(G.GAME.blind)=="Teeny"), scoring_hand = SMODS.last_hand.scoring_hand, scoring_name = SMODS.last_hand.scoring_name, full_hand = SMODS.last_hand.full_hand })
if G.GAME.round_resets.ante > 7 and G.GAME.modifiers.blind_stickers and not G.GAME.modifiers.showdown_stickers then
    G.GAME.modifiers.showdown_stickers = true
end
if G.GAME.modifiers.blind_stickers and Colonparen.get_blind_type(G.GAME.blind)=="CEO" then
        local tab = {}
        local ae = NAMETEAM.poll_sticker(true, G.GAME.selected_back, true, "Blind")
          
        for k, v in pairs(SMODS.Stickers) do
            if v.sets and v.sets["Blind"] then
                if v.showdown_sticker then
                    if G.GAME.modifiers.showdown_stickers then
                        tab[#tab+1] = k
                    end
                else
                    tab[#tab+1] = k
                end
            end
        end

        for k, v in pairs(tab) do
            if G.GAME.selected_back.ability[v] then
                G.GAME.selected_back:nteam_remove_sticker(v)
            end
        end

        G.GAME.selected_back:nteam_apply_sticker(ae)
    end
'''
match_indent = true


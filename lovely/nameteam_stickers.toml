# Sticker Badges

# Add mod badge
# Apparently, this is taken from Papeback
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "badges.mod_set = nil"
position = "before"
payload = '''
for k, v in pairs(SMODS.Stickers) do
  if card and card.ability and string.find(k, "cbean") and card.ability[k] and G.your_collection then
    for i = 1, #G.your_collection do
        if card.area == G.your_collection[i] then
            SMODS.create_mod_badges(SMODS.Stickers[k], badges)
        end
    end
  end
end
'''
match_indent = true


# Adding sticker appearance in shops (this is so wrong istg)
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "create_shop_card_ui(card, v.type, area)"
position = "before"
payload = '''
for kk, vv in pairs(SMODS.ConsumableTypes) do
    if G.GAME.modifiers.consumable_stickers then
        if kk == v.type then
            local st = NAMETEAM.poll_sticker(false, card, true, "Consumable")
            if st then
                SMODS.Stickers[st]:apply(card, true)
            end
            break
        end
    end
end
'''
match_indent = true


[manifest]
version = "1.0.0"
dump_lua = true
priority = -1


# Sticker sets

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
key = "eternal",
'''
position = 'after'
payload = '''
sets = {
    Joker = true
},
'''
match_indent = false

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
key = "perishable",
'''
position = 'after'
payload = '''
sets = {
    Joker = true,
    Default = true,
    Enhanced = true,
},
'''
match_indent = false

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
key = "rental",
'''
position = 'after'
payload = '''
sets = {
    Joker = true,
    Default = true,
    Enhanced = true,
    Consumable = true,
},
'''
match_indent = false

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
key = "pinned",
'''
position = 'after'
payload = '''
sets = {
    Joker = true,
},
'''
match_indent = false

# Perishable trigger twice fix

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
            if context.end_of_round and not context.repetition and not context.individual then
                card:calculate_perishable()
            end
'''
position = 'at'
payload = '''
        if card.ability.set == "Default" or card.ability.set == "Enhanced" then
            if context.end_of_round and not card.cbean_temp_check then
                card.cbean_temp_check = true
                card:calculate_perishable()
            end
        elseif context.end_of_round and not context.repetition and not context.individual then
            card:calculate_perishable()
        end

'''
match_indent = false

# Rental trigger twice fix
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
            if context.end_of_round and not context.repetition and not context.individual then
                card:calculate_rental()
            end
'''
position = 'at'
payload = '''
        if card.ability.set == "Default" or card.ability.set == "Enhanced" then
            if context.end_of_round and not card.cbean_temp_check then
                card.cbean_temp_check = true
                card:calculate_rental()
            end
        elseif context.end_of_round and not context.repetition and not context.individual then
            card:calculate_rental()
        end

'''
match_indent = false


# Sticker Badges

# Add mod badge
# Apparently, this is taken from Papeback
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "badges.mod_set = nil"
position = "before"
payload = '''
for k, v in pairs(SMODS.Stickers) do
  if card and card.ability and string.find(k, "cbean") and card.ability[k] and G.your_collection then
    for i = 1, #G.your_collection do
        if card.area == G.your_collection[i] then
            SMODS.create_mod_badges(SMODS.Stickers[k], badges)
        end
    end
  end
end
'''
match_indent = true


# Adding sticker appearance in shops (this is so wrong istg)
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "create_shop_card_ui(card, v.type, area)"
position = "before"
payload = '''
for kk, vv in pairs(SMODS.ConsumableTypes) do
    if G.GAME.modifiers.consumable_stickers then
        if kk == v.type then
            local st = NAMETEAM.poll_sticker(false, card, true, "Consumable")
            if st then
                SMODS.Stickers[st]:apply(card, true)
            end
            break
        end
    end
end
'''
match_indent = true

# Sticker applied / removed

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
        apply = function(self, card, val)
            card.ability[self.key] = val
            if val and self.config and next(self.config) then
                card.ability[self.key] = {}
                for k, v in pairs(self.config) do
                    if type(v) == 'table' then
                        card.ability[self.key][k] = copy_table(v)
                    else
                        card.ability[self.key][k] = v
                    end
                end
            end
        end
'''
position = 'after'
payload = '''
,NAMETEAM_applied = function(self, card)
end,
NAMETEAM_removed = function(self, card)
end,
'''
match_indent = false

# sticker functions

[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/game_object.lua"]'
pattern = '''
            card.ability[self.key] = val
            if val and self.config and next(self.config) then
                card.ability[self.key] = {}
                for k, v in pairs(self.config) do
                    if type(v) == 'table' then
                        card.ability[self.key][k] = copy_table(v)
                    else
                        card.ability[self.key][k] = v
                    end
                end
            end
        end
'''
position = 'before'
payload = '''
	if val == false and card.ability[self.key] then
        card = card
        if self and self.NAMETEAM_removed then
        card:NAMETEAM_remove_sticker_calc(self, card)
        end
    else
        card = card
        if self and self.NAMETEAM_applied then
        card:NAMETEAM_apply_sticker_calc(self, card)
        end
    end
'''
match_indent = false


# Dissolve checks
# this probably should be on something like card:remove but idc
[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = '''
if not no_juice then self:juice_up() end
'''
position = 'after'
payload = '''
if self.ability then
    for k, v in pairs(SMODS.Stickers) do
        if self.ability[k] then
            self:NAMETEAM_remove_sticker_calc(v, self)
        end
    end
 end
'''
match_indent = false

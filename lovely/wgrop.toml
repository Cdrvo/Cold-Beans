# add custom bg colors
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
pattern = '''ease_background_colour{new_colour = G.C.BLIND['Small'], contrast = 1}'''
position = "at"
payload = '''
ease_background_colour{new_colour = G.C.BLIND[G.GAME.round_resets.blind_biome], contrast = 1}
'''

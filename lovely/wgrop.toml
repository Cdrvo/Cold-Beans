# add volcanic discard money
[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''add_round_eval_row({dollars = G.GAME.current_round.discards_left*(G.GAME.modifiers.money_per_discard), disp = G.GAME.current_round.discards_left, bonus = true, name='discards', pitch = pitch})'''
position = "at"
payload = '''
add_round_eval_row({dollars = G.GAME.current_round.discards_left*((G.GAME.modifiers.money_per_discard or 0 + (G.GAME.modifiers.volcanic_money or 0))), disp = G.GAME.current_round.discards_left, bonus = true, name='discards', pitch = pitch})
'''

[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# wgrop
# biome select instead of shop
[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''G.STATE = G.STATES.SHOP'''
position = "at"
payload = '''
-- Show the biome select screen if after CEO blind
if G.WGRP_CEOBLIND then
G.STATE = G.STATES.BIOMETREE
G.WGRP_CEOBLIND = false
else
G.STATE = G.STATES.SHOP
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
pattern = '''if  G.GAME and G.GAME.blind and G.GAME.blind.get_type then'''
position = "after"
payload = '''
if (G.GAME.blind:get_type() == 'CEO') then
    G.WGRP_CEOBLIND = true
else
    G.WGRP_CEOBLIND = false
end
'''
match_indent = true

# biome select
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''if self.STATE == self.STATES.PLAY_TAROT then '''
position = "before"
payload = '''
if self.STATE == self.STATES.BIOMETREE then
    update_wgrop_biometree()
end
'''
match_indent = true

# hide the fuckin hands when in biome select state actually :nerd:
[[patches]]
[patches.pattern]
target = "cardarea.lua"
pattern = '''    if self.ARGS.invisible_area_types[self.config.type] or'''
position = "after"
payload = '''(self.config.type == 'hand' and ({[9223376854775807]=1})[state]) or'''
match_indent = true

# add biomes when game starts
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''blind_ante = 1,'''
position = "after"
payload = '''blind_biome = 'wgrop_city', -- default biome'''
match_indent = true

# select a random biome when game starts
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = '''self.GAME.round_resets.blind_choices.Boss = get_new_boss()'''
position = "after"
payload = '''self.GAME.round_resets.blind_biome = CBWG.get_new_biome(false) --Sets a random biome at start of game
CBWG.ColdBeans_Biomes[self.GAME.round_resets.blind_biome]:enter(false)'''
match_indent = true

# modify pool
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''add = in_pool and (add or pool_opts.override_base_checks)'''
position = "after"
payload = '''if _type == 'Joker' and not CBWG.in_pool(v.key) then
add = false
end'''
match_indent = true

# modify pool
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''function get_current_pool(_type, _rarity, _legendary, _append)'''
position = "after"
payload = '''if _type == 'Joker' then
if pseudorandom('biome') < 1*(7/10) and not _legendary then
_type = G.GAME.round_resets.blind_biome
end
end'''
match_indent = true

# modify prompt box
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = '''
  G.blind_prompt_box = UIBox{
    definition =
      {n=G.UIT.ROOT, config = {align = 'cm', colour = G.C.CLEAR, padding = 0.2}, nodes={
        {n=G.UIT.R, config={align = "cm"}, nodes={
          {n=G.UIT.O, config={object = DynaText({string = localize('ph_choose_blind_1'), colours = {G.C.WHITE}, shadow = true, bump = true, scale = 0.6, pop_in = 0.5, maxw = 5}), id = 'prompt_dynatext1'}}
        }},
        {n=G.UIT.R, config={align = "cm"}, nodes={
          {n=G.UIT.O, config={object = DynaText({string = localize('ph_choose_blind_2'), colours = {G.C.WHITE}, shadow = true, bump = true, scale = 0.7, pop_in = 0.5, maxw = 5, silent = true}), id = 'prompt_dynatext2'}}
        }},
        (G.GAME.used_vouchers["v_retcon"] or G.GAME.used_vouchers["v_directors_cut"]) and
        UIBox_button({label = {localize('b_reroll_boss'), localize('$')..'10'}, button = "reroll_boss", func = 'reroll_boss_button'}) or nil
      }},
    config = {align="cm", offset = {x=0,y=-15},major = G.HUD:get_UIE_by_ID('row_blind'), bond = 'Weak'}
  }
  G.E_MANAGER:add_event(Event({
    trigger = 'immediate',
    func = (function()
        G.blind_prompt_box.alignment.offset.y = 0
        return true
    end)
  }))'''
position = "after"
payload = '''local shop_sign = Sprite(0, 0, 4.4, 2.2,
        G.ASSET_ATLAS[CBWG.ColdBeans_Biomes[G.GAME.round_resets.blind_biome].atlas], CBWG.ColdBeans_Biomes[G.GAME.round_resets.blind_biome].pos)
    shop_sign:define_draw_steps({
      {shader = 'dissolve', shadow_height = 0.05},
      {shader = 'dissolve'}
    })
    G.blind_prompt_box = UIBox{
      definition = 
        {n=G.UIT.ROOT, config = {colour = G.C.DYN_UI.MAIN, emboss = 0.05, align = 'cm', r = 0.1, padding = 0.1}, nodes={
          {n=G.UIT.R, config={align = "cm", padding = 0.1, minw = 4.72, minh = 3.1, colour = G.C.DYN_UI.DARK, r = 0.1}, nodes={
            {n=G.UIT.R, config={align = "cm"}, nodes={
              {n=G.UIT.O, config={object = shop_sign}}
            }},
            {n=G.UIT.R, config={align = "cm"}, nodes={
              {n=G.UIT.C, config = {align = "cm", padding = 0.1}, nodes = {
                {n=G.UIT.R, config={align = "cm"}, nodes={
                {n=G.UIT.O, config={object = DynaText({string = localize('ph_choose_blind_1'), colours = {G.C.WHITE}, shadow = true, bump = true, scale = 0.5, pop_in = 0.5, maxw = 5}), id = 'prompt_dynatext1'}}
                }},
                {n=G.UIT.R, config={align = "cm"}, nodes={
                {n=G.UIT.O, config={object = DynaText({string = localize('ph_choose_blind_2'), colours = {G.C.WHITE}, shadow = true, bump = true, scale = 0.6, pop_in = 0.5, maxw = 5, silent = true}), id = 'prompt_dynatext2'}}
                }},
              }},
              {n=G.UIT.C, config = {align = "cm", padding = 0.1}, nodes = {
                (G.GAME.used_vouchers["v_retcon"] or G.GAME.used_vouchers["v_directors_cut"]) and
                UIBox_button({label = {localize('b_reroll'), localize('$')..'10'}, minw = 1.5, button = "reroll_boss", func = 'reroll_boss_button'}) or nil
              }},
            }},
          }},
        }},
      config = {
        align="cm",
        offset = {x=0,y=-15},
        major = G.HUD:get_UIE_by_ID('row_blind'),
        bond = 'Weak'
      }
    }
    G.E_MANAGER:add_event(Event({
      trigger = 'immediate',
      func = (function()
          G.blind_prompt_box.alignment.offset.y = 0
          return true
      end)
    }))'''
match_indent = true

# add biome calculate
[[patches]]
[patches.pattern]
target = '=[SMODS _ "src/utils.lua"]'
pattern = '''-- TARGET: add your own individual scoring targets'''
position = "before"
payload = '''
        if CBWG.ColdBeans_Biomes[G.GAME.round_resets.blind_biome] then t[#t + 1] = { object = CBWG.ColdBeans_Biomes[G.GAME.round_resets.blind_biome], scored_card = G.GAME.blind.children.animatedSprite } end
'''
match_indent = true

# add volcanic no hand money

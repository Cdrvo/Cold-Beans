[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Pissboys
# [Placeholder]'s over-discard effect subtract hands instead of discards
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''ease_discard(-1)'''
position = "at"
payload = '''
if next(SMODS.find_card("j_cbean_pboys_placeholder")) and G.GAME.current_round.discards_left <= 0 then
    ease_hands_played(0-1) --This weird operation is to prevent unwanted pattern and regex patches
    --Unless someone is mad enough to add a system that allows fractional hands/discards per hand/discard used >:(
else
    ease_discard(-1)
end
'''
match_indent = true

# Steamer's effect: if Booster Pack contains a Rare Joker, send custom context
[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
for k, v in ipairs(pack_cards) do
    G.pack_cards:emplace(v)
end
'''
position = "at"
payload = '''
local has_rare = false
for k, v in ipairs(pack_cards) do
    if v:is_rarity(3) then
        has_rare = true
    end
    G.pack_cards:emplace(v)
end
if next(SMODS.find_card("j_cbean_pboys_streamer")) and has_rare then
    SMODS.calculate_context{cbean_streamer_hype = true}
end
'''
match_indent = true